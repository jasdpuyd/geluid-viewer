<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geluidsdata Visualisatie Tool - Kortrijk</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-panel: #141922;
            --accent-primary: #00ff88;
            --accent-secondary: #ff0066;
            --text-primary: #e4e8f0;
            --text-secondary: #8892a6;
            --border-color: #2a3244;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 380px;
            background: var(--bg-panel);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 2px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1px;
        }

        .sidebar-header p {
            font-size: 15px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .control-section {
            margin-bottom: 28px;
        }

        .control-section h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-primary);
            margin-bottom: 14px;
            font-weight: 600;
        }

        .dataset-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dataset-btn {
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 16px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-align: left;
        }

        .dataset-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--accent-primary);
            transform: scaleY(0);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dataset-btn:hover::before,
        .dataset-btn.active::before {
            transform: scaleY(1);
        }

        .dataset-btn:hover {
            border-color: var(--accent-primary);
            transform: translateX(4px);
        }

        .dataset-btn.active {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--accent-primary);
        }

        .dataset-btn .date {
            font-weight: 800;
            font-size: 15px;
            margin-bottom: 4px;
            display: block;
        }

        .dataset-btn .info {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .timeline-slider {
            width: 100%;
            height: 6px;
            background: var(--bg-dark);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            margin: 12px 0;
        }

        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.5);
        }

        .playback-controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 16px;
        }

        .control-btn {
            background: var(--bg-dark);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-dark);
            border-color: var(--accent-primary);
        }

        .control-btn.active {
            background: var(--accent-primary);
            color: var(--bg-dark);
        }

        .speed-controls {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .speed-btn {
            flex: 1;
            background: var(--bg-dark);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .speed-btn.active {
            background: var(--accent-primary);
            color: var(--bg-dark);
        }

        .metadata-display {
            background: var(--bg-dark);
            border: 2px solid var(--border-color);
            padding: 16px;
            margin-top: 20px;
        }

        .metadata-display h4 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-secondary);
            margin-bottom: 12px;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
        }

        .meta-item:last-child {
            border-bottom: none;
        }

        .meta-label {
            color: var(--text-secondary);
        }

        .meta-value {
            font-weight: 600;
            color: var(--accent-primary);
        }

        .current-time {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            color: var(--accent-primary);
            font-family: 'Space Mono', monospace;
            letter-spacing: 2px;
            padding: 12px 0;
            margin: 8px 0;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            display: block;
            background: var(--bg-dark);
            border: 2px solid var(--border-color);
            width: 100%;
        }

        .map-container {
            flex: 1;
            position: relative;
            background: #1a1a2e;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .legend {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(20, 25, 34, 0.95);
            border: 2px solid var(--border-color);
            padding: 16px;
            z-index: 999;
        }

        .legend h4 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-primary);
            margin-bottom: 12px;
        }

        .legend-gradient {
            width: 200px;
            height: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 8px;
        }

        .color-scale-selector {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(20, 25, 34, 0.95);
            border: 2px solid var(--border-color);
            padding: 12px;
            z-index: 1000;
            font-size: 11px;
            width: 200px;
        }

        .color-scale-selector label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
            font-weight: 600;
        }

        .color-scale-selector select {
            width: 100%;
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            cursor: pointer;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 23, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .period-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .period-btn {
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 10px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .period-btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-secondary);
            transform: scaleX(0);
            transition: transform 0.25s;
        }

        .period-btn:hover::before,
        .period-btn.active::before {
            transform: scaleX(1);
        }

        .period-btn:hover {
            border-color: var(--accent-secondary);
        }

        .period-btn.active {
            background: rgba(255, 0, 102, 0.12);
            border-color: var(--accent-secondary);
        }

        .period-btn .period-name {
            display: block;
            font-weight: 800;
            font-size: 14px;
            color: var(--accent-secondary);
            margin-bottom: 3px;
        }

        .period-btn .period-desc {
            display: block;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .leaflet-container {
            background: #1a1a2e !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>SOUND VIEWER</h1>
                <p>Sound Data Player</p>
            </div>
            
            <div class="sidebar-content">
                <div class="control-section">
                    <h3>Stap 1 — Dag</h3>
                    <div class="dataset-buttons">
                        <button class="dataset-btn" data-dataset="1">
                            <span class="date">29 Augustus</span>
                            <span class="info">Reeks 1 • 8021 opnames</span>
                        </button>
                        <button class="dataset-btn" data-dataset="2">
                            <span class="date">30 Augustus</span>
                            <span class="info">Reeks 2 • 26805 opnames</span>
                        </button>
                        <button class="dataset-btn" data-dataset="3">
                            <span class="date">31 Augustus</span>
                            <span class="info">Reeks 3 • 26361 opnames</span>
                        </button>
                    </div>
                </div>

                <div class="control-section" id="periodSection" style="display:none;">
                    <h3>Stap 2 — Tijdsperiode</h3>
                    <div class="period-buttons">
                        <button class="period-btn active" data-period="1sec">
                            <span class="period-name">1 sec</span>
                            <span class="period-desc">Ruwe meting</span>
                        </button>
                        <button class="period-btn" data-period="1min">
                            <span class="period-name">1 min</span>
                            <span class="period-desc">LAeq 1 minuut</span>
                        </button>
                        <button class="period-btn" data-period="5min">
                            <span class="period-name">5 min</span>
                            <span class="period-desc">LAeq 5 minuten</span>
                        </button>
                        <button class="period-btn" data-period="15min">
                            <span class="period-name">15 min</span>
                            <span class="period-desc">LAeq 15 minuten</span>
                        </button>
                    </div>
                </div>

                <div class="control-section">
                    <h3>Huidige Tijd</h3>
                    <div class="current-time" id="currentTime">--:--:--</div>
                    <div style="text-align:center; font-size:12px; color: var(--text-secondary);" id="currentDate">--/--/----</div>
                </div>

                <div class="control-section">
                    <h3>Tijdlijn</h3>
                    <div style="margin-top: 16px;">
                        <input type="range" id="timelineSlider" class="timeline-slider" min="0" max="100" value="0">
                    </div>
                </div>

                <div class="control-section">
                    <h3>Afspeelcontroles</h3>
                    <div class="playback-controls">
                        <button class="control-btn" id="prevBtn">⏮</button>
                        <button class="control-btn" id="playBtn">▶</button>
                        <button class="control-btn" id="pauseBtn">⏸</button>
                        <button class="control-btn" id="nextBtn">⏭</button>
                    </div>
                    
                    <div class="speed-controls">
                        <button class="speed-btn" data-speed="0.5">0.5x</button>
                        <button class="speed-btn active" data-speed="1">1x</button>
                        <button class="speed-btn" data-speed="2">2x</button>
                        <button class="speed-btn" data-speed="5">5x</button>
                        <button class="speed-btn" data-speed="10">10x</button>
                    </div>
                </div>

                <div class="control-section">
                    <h3>Metadata</h3>
                    <div class="metadata-display">
                        <h4>Huidige Frame</h4>
                        <div class="meta-item">
                            <span class="meta-label">Bestandsnaam:</span>
                            <span class="meta-value" id="metaFilename">-</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Frame:</span>
                            <span class="meta-value" id="metaFrameNumber">-</span>
                        </div>
                    </div>
                </div>

                <div id="errorContainer"></div>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
            
            <div class="color-scale-selector">
                <label for="colorScaleSelect">Kleurenschaal</label>
                <select id="colorScaleSelect">
                    <option value="green-red" selected>Groen → Rood</option>
                    <option value="blue-orange">Blauw → Oranje</option>
                    <option value="black-white">Zwart → Wit</option>
                </select>
            </div>
            
            <div class="legend">
                <h4>Geluidsniveau (dB(A))</h4>
                <div class="legend-gradient" id="legendGradient"></div>
                <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--text-secondary);">
                    <span>30 dB</span>
                    <span>60 dB</span>
                    <span>90 dB</span>
                </div>
            </div>

            <div class="loading-overlay" id="loadingOverlay">
                <div style="text-align: center;">
                    <div class="loading-spinner"></div>
                    <div id="loadingText" style="font-size: 14px; color: var(--text-primary); margin-top: 12px;">Laden...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.0.7/dist-browser/geotiff.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.js"></script>
    
    <script>
        const R2_BASE_URL = 'https://pub-ec0c3469df3e4dac8e1524acce2b51d3.r2.dev';

        const state = {
            urlsByPeriod: { '1sec': [], '1min': [], '5min': [], '15min': [] },
            files: [],
            currentDataset: null,
            currentPeriod: '1sec',
            currentIndex: 0,
            isPlaying: false,
            playbackSpeed: 1,
            playbackInterval: null,
            map: null,
            currentLayer: null,
            colorScale: 'green-red',
            preloadedFrames: new Map(),
        };

        const DATASET_MAP = {
            '1': { folder: 'reeks1', date: '20240829' },
            '2': { folder: 'reeks2', date: '20240830' },
            '3': { folder: 'reeks3', date: '20240831' }
        };

        const PERIODES = {
            '1sec': { label: '1 seconde', mapFolder: '1sec' },
            '1min': { label: '1 minuut', mapFolder: '1min' },
            '5min': { label: '5 minuten', mapFolder: '5min' },
            '15min': { label: '15 minuten', mapFolder: '15min' },
        };

        window.addEventListener('load', function() {
            console.log('Application starting...');
            initializeApp();
        });

        function initializeApp() {
            // Initialize map
            state.map = L.map('map').setView([50.815, 3.261], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.map);

            // Setup event listeners
            document.querySelectorAll('.dataset-btn').forEach(btn => {
                btn.addEventListener('click', onDatasetSelected);
            });

            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.addEventListener('click', onPeriodSelected);
            });

            document.getElementById('playBtn').addEventListener('click', togglePlay);
            document.getElementById('pauseBtn').addEventListener('click', () => {
                state.isPlaying = false;
                if (state.playbackInterval) clearInterval(state.playbackInterval);
            });
            document.getElementById('nextBtn').addEventListener('click', nextFrame);
            document.getElementById('prevBtn').addEventListener('click', prevFrame);
            document.getElementById('timelineSlider').addEventListener('input', onTimelineChange);

            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    state.playbackSpeed = parseFloat(e.target.dataset.speed);
                });
            });

            document.getElementById('colorScaleSelect').addEventListener('change', (e) => {
                state.colorScale = e.target.value;
                if (state.currentLayer && state.files.length > 0) {
                    displayFrame(state.currentIndex);
                }
            });

            console.log('App initialized');
        }

        function onDatasetSelected(e) {
            const dataset = e.target.closest('.dataset-btn').dataset.dataset;
            state.currentDataset = dataset;

            // Update UI
            document.querySelectorAll('.dataset-btn').forEach(btn => btn.classList.remove('active'));
            e.target.closest('.dataset-btn').classList.add('active');
            document.getElementById('periodSection').style.display = 'block';

            // Load files for this dataset
            loadDatasetFiles();
        }

        async function loadDatasetFiles() {
            if (!state.currentDataset) return;

            const datasetInfo = DATASET_MAP[state.currentDataset];
            if (!datasetInfo) return;

            showLoading(true);

            try {
                const period = state.currentPeriod;
                const indexUrl = `${R2_BASE_URL}/${datasetInfo.folder}/${PERIODES[period].mapFolder}/index.json`;
                
                console.log('Loading from:', indexUrl);
                const response = await fetch(indexUrl);
                
                if (!response.ok) {
                    throw new Error(`Failed to load index: ${response.status}`);
                }
                
                const index = await response.json();
                console.log('Index loaded:', index);
                
                // Extract file URLs
                state.files = (index.files || []).map(file => ({
                    url: `${R2_BASE_URL}/${datasetInfo.folder}/${PERIODES[period].mapFolder}/${file}`,
                    name: file
                }));

                console.log(`Loaded ${state.files.length} files`);

                if (state.files.length > 0) {
                    state.currentIndex = 0;
                    await displayFrame(0);
                    document.getElementById('timelineSlider').max = state.files.length - 1;
                } else {
                    showError('No files found for this dataset');
                }
            } catch (error) {
                console.error('Error loading files:', error);
                showError('Error loading dataset: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        async function onPeriodSelected(e) {
            const period = e.target.closest('.period-btn').dataset.period;
            state.currentPeriod = period;

            // Update UI
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            e.target.closest('.period-btn').classList.add('active');

            // Reload files for new period
            await loadDatasetFiles();
        }

        async function displayFrame(index) {
            if (index < 0 || index >= state.files.length) return;

            state.currentIndex = index;
            const file = state.files[index];

            showLoading(true);

            try {
                const response = await fetch(file.url);
                if (!response.ok) throw new Error(`Failed to fetch: ${response.status}`);
                
                const arrayBuffer = await response.arrayBuffer();
                const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
                const image = await tiff.getImage();
                const data = await image.readRasters();
                const bbox = image.getBoundingBox();

                console.log('Image loaded:', file.name);

                // Remove old layer
                if (state.currentLayer) {
                    state.map.removeLayer(state.currentLayer);
                }

                // Create canvas from raster data
                const canvas = createCanvasFromRaster(data[0], image.getWidth(), image.getHeight());
                const bounds = [[bbox[1], bbox[0]], [bbox[3], bbox[2]]];
                
                state.currentLayer = L.imageOverlay(canvas.toDataURL(), bounds).addTo(state.map);

                // Update metadata
                document.getElementById('metaFilename').textContent = file.name;
                document.getElementById('metaFrameNumber').textContent = `${index + 1}/${state.files.length}`;
                document.getElementById('timelineSlider').value = index;

                updateLegend(data[0]);
            } catch (error) {
                console.error('Error displaying frame:', error);
                showError('Error loading frame: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function createCanvasFromRaster(data, width, height) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.createImageData(width, height);
            const pixelData = imageData.data;

            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;

            for (let i = 0; i < data.length; i++) {
                const normalized = (data[i] - min) / range;
                const [r, g, b] = getColorForValue(normalized, state.colorScale);
                
                const pixelIndex = i * 4;
                pixelData[pixelIndex] = r;
                pixelData[pixelIndex + 1] = g;
                pixelData[pixelIndex + 2] = b;
                pixelData[pixelIndex + 3] = 255;
            }

            ctx.putImageData(imageData, 0, 0);
            return canvas;
        }

        function getColorForValue(value, scale) {
            if (scale === 'green-red') {
                return [
                    Math.round(value * 255),
                    Math.round((1 - value) * 255),
                    0
                ];
            } else if (scale === 'blue-orange') {
                if (value < 0.5) {
                    const t = value * 2;
                    return [0, Math.round(128 + t * 127), 255];
                } else {
                    const t = (value - 0.5) * 2;
                    return [Math.round(t * 255), Math.round(165 + t * 90), 0];
                }
            }
            return [Math.round(value * 255), Math.round(value * 255), Math.round(value * 255)];
        }

        function updateLegend(data) {
            const gradient = document.getElementById('legendGradient');
            
            let colors = [];
            if (state.colorScale === 'green-red') {
                colors = ['#00FF00', '#FFFF00', '#FF0000'];
            } else if (state.colorScale === 'blue-orange') {
                colors = ['#0080FF', '#FF8000', '#FF0000'];
            } else {
                colors = ['#000000', '#808080', '#FFFFFF'];
            }
            
            gradient.style.background = `linear-gradient(to right, ${colors.join(',')})`;
        }

        function onTimelineChange(e) {
            displayFrame(parseInt(e.target.value));
        }

        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            document.getElementById('playBtn').classList.toggle('active', state.isPlaying);

            if (state.isPlaying) {
                if (state.playbackInterval) clearInterval(state.playbackInterval);
                state.playbackInterval = setInterval(() => {
                    if (state.currentIndex < state.files.length - 1) {
                        displayFrame(state.currentIndex + 1);
                    } else {
                        state.isPlaying = false;
                        document.getElementById('playBtn').classList.remove('active');
                        clearInterval(state.playbackInterval);
                    }
                }, 1000 / state.playbackSpeed);
            } else {
                if (state.playbackInterval) clearInterval(state.playbackInterval);
            }
        }

        function nextFrame() {
            if (state.currentIndex < state.files.length - 1) {
                displayFrame(state.currentIndex + 1);
            }
        }

        function prevFrame() {
            if (state.currentIndex > 0) {
                displayFrame(state.currentIndex - 1);
            }
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('show', show);
        }

        function showError(message) {
            console.error(message);
            const container = document.getElementById('errorContainer');
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = `
                background: rgba(255, 0, 102, 0.1);
                border: 2px solid #ff0066;
                color: #ff0066;
                padding: 12px;
                margin: 12px 0;
                font-size: 12px;
                border-radius: 4px;
            `;
            errorDiv.textContent = message;
            container.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 5000);
        }
    </script>
</body>
</html>
